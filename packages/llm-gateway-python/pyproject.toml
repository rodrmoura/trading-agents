[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-gateway"
version = "0.0.1"
description = "Generic Python SDK skeleton for the native VS Code LLM gateway."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
langchain = ["langchain-core>=0.3.81"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["llm_gateway*"]